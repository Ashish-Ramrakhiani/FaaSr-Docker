name: gcp -> Google Container Registry

on: 
  workflow_dispatch:
    inputs:
      # BASE_IMAGE is the full user/name:tag of the base FaaSr image (stored in DockerHub) to build from 
      # Examples: janedoe/base-tidyverse:1.1.2, faasr/base-tidyverse:1.1.3
      BASE_IMAGE:
        description: 'user/name:tag of the base FaaSr image e.g. janedoe/base-tidyverse:1.1.2'
        required: true
        default: 'faasr/base-tidyverse:1.1.2'
      # TARGET_NAME is the name of the FaaS-specific image to build
      # Examples: gcp-tidyverse
      TARGET_NAME:
        description: 'name of the FaaS-specific image to build'
        required: true
        default: 'gcp-tidyverse'
      # FAASR_VERSION is the FaaSr version tag to be used for this base FaaSr image
      # Examples: 1.1.2, 1.3.1
      FAASR_VERSION:
        description: 'FaaSr version'
        required: true 
      # FAASR_INSTALL_REPO is the GitHub repo to install FaaSr from
      # Examples: janedoe/FaaSr-Package-dev, faasr/FaaSr-Package
      FAASR_INSTALL_REPO:
        description: 'GitHub repo to install FaaSr from'
        required: true
        default: 'faasr/FaaSr-Package'
      # GCP_PROJECT_ID is the Google Cloud Project ID
      GCP_PROJECT_ID:
        description: 'Google Cloud Project ID'
        required: true
      # GCR_REGION is the Google Container Registry region
      GCR_REGION:
        description: 'Google Container Registry region'
        required: true
        default: 'us-central1'

permissions: write-all

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ github.event.inputs.GCP_PROJECT_ID }}
          export_default_credentials: true
      
      - name: Configure Docker to use gcloud as a credential helper
        run: |
          gcloud auth configure-docker ${{ github.event.inputs.GCR_REGION }}-docker.pkg.dev
      
      - name: Build GCP image
        run: |
          cd faas_specific
          docker build -f gcp.Dockerfile -t ${{ github.event.inputs.GCR_REGION }}-docker.pkg.dev/${{ github.event.inputs.GCP_PROJECT_ID }}/faasr/${{ github.event.inputs.TARGET_NAME }}:${{ github.event.inputs.FAASR_VERSION }} --build-arg BASE_IMAGE=${{ github.event.inputs.BASE_IMAGE }} --build-arg FAASR_VERSION=${{ github.event.inputs.FAASR_VERSION }} --build-arg FAASR_INSTALL_REPO=${{ github.event.inputs.FAASR_INSTALL_REPO }} .
      
      - name: Push GCP image to Google Container Registry
        run: |
          docker push ${{ github.event.inputs.GCR_REGION }}-docker.pkg.dev/${{ github.event.inputs.GCP_PROJECT_ID }}/faasr/${{ github.event.inputs.TARGET_NAME }}:${{ github.event.inputs.FAASR_VERSION }}